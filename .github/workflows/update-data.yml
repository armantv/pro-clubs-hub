# Optionaler Cloud-Updater: laeuft alle 6 Stunden auf GitHub und holt
# neue Spiele von ourproclub.app (EA selbst blockt Cloud-Server, darum
# kommt der volle EA-Abruf weiterhin vom eigenen PC via Auto-Update).
# Findet der Lauf nichts Neues, passiert einfach nichts.
name: Daten-Update (Cloud)

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Daten holen (nur ourproclub, ohne Browser)
        run: python update.py --cloud --no-push
      - name: Committen & pushen, wenn es Neues gibt
        run: |
          git config user.name "proclubs-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js matches_store.json
          git diff --cached --quiet || { git commit -m "Cloud-Datenupdate"; git push; }
